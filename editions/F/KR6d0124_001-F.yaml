body:
  text: 佛說觀世音經一卷讀誦千遍得度苦難拔除生死罪觀世音菩薩南无佛佛國有緣佛法相因常樂我淨南无摩訶波若是大神呪南无摩訶波若是大明呪南无摩訶波若是大等等呪淨光祕密佛法藏佛師子吼神足遊王佛告須弥登王佛法護佛金剛藏師子游戲佛藥師瑠璃光佛普光功德山王佛善住功德寶王佛六方六佛名号東方寶光月殿妙尊音王佛南方樹根華王佛西方皂王神通焰華王佛北方月殿清淨佛上方无數精進寶首佛下方善寂月音王佛釋迦牟𡰱佛弥勒佛中央一切眾生在此世界中者行住於地上及在虛空中慈憂於一切令各安休息晝夜脩治心常應誦此經消伏於
